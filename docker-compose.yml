version: '3.8'

services:

  # =========================
  # Django App
  # =========================
  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

  # =========================
  # PostgreSQL Database
  # =========================
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: env('DB_USER')
      POSTGRES_PASSWORD: env('DB_PASSWORD')
      POSTGRES_DB: env('DB_NAME')
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # =========================
  # Redis (Celery Broker)
  # =========================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # =========================
  # Celery Worker
  # =========================
  celery_worker:
    build: ./backend
    command: celery -A grc_backend worker -l info
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    env_file:
      - ./backend/.env

  # =========================
  # Celery Beat Scheduler
  # =========================
  celery_beat:
    build: ./backend
    command: celery -A grc_backend beat -l info
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    env_file:
      - ./backend/.env

volumes:
  postgres_data: